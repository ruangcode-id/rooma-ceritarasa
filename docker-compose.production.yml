# Production stack: Postgres + Next.js + Caddy
# Usage (di VPS):
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d --build
#
# IMPORTANT:
# - Jangan expose port Postgres ke publik
# - Simpan secret hanya di .env.production (chmod 600)

services:
  db:
    image: postgres:16
    container_name: rooma-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rooma_db}
      POSTGRES_USER: ${POSTGRES_USER:-rooma_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - rooma_pgdata:/var/lib/postgresql/data
    networks:
      - rooma_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: rooma-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      # Paksa host Docker internal (jangan pakai localhost)
      DATABASE_URL: postgresql://${POSTGRES_USER:-rooma_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rooma_db}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rooma_internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  caddy:
    image: caddy:2-alpine
    container_name: rooma-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - rooma_internal

networks:
  rooma_internal:
    driver: bridge

volumes:
  rooma_pgdata:
  caddy_data:
  caddy_config:
